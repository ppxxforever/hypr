# Hypridle configuration
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Dim screen after 5 minutes, then restore brightness on activity.
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 15%
    on-resume = brightnessctl -r
}

# Lock session after 5.5 minutes.
listener {
    timeout = 330
    on-timeout = loginctl lock-session
}

# Turn displays off after 10 minutes, turn back on when activity resumes.
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes of inactivity.
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
